# -----------------------------------------------------------------------------
# nginx config for Jenkins Performance Analyzer frontend
# * Serves static React build
# * Proxies /api/* and /health to the Python backend
# * Handles SPA client-side routing (fallback to index.html)
# -----------------------------------------------------------------------------

upstream backend {
    # Docker Compose service name "api" resolves via internal DNS
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -- Gzip compression ------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;

    # -- Security headers ------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -- Static asset caching --------------------------------------------------
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -- Batch AI analysis (SSE stream, can run 10+ mins for large logs + slow Ollama) ---
    location /api/analyze/batch {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 900s;   # 15 min -- covers slow Ollama synthesis
        proxy_send_timeout 900s;
        chunked_transfer_encoding on;
    }

    # -- API proxy -> Python FastAPI backend ------------------------------------
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # SSE (streaming AI responses) -- disable buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        chunked_transfer_encoding on;
    }

    # -- Health endpoint proxy -------------------------------------------------
    location /health {
        proxy_pass         http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # -- File upload -- allow larger bodies ------------------------------------
    location /api/upload {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # -- SPA fallback (React Router) -------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
