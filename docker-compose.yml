# -----------------------------------------------------------------------------
# Jenkins Performance Analyzer -- Docker Compose
#
# Profiles:
#   (none / default)  ->  API + Frontend only. Use Anthropic or private AI.
#   ollama            ->  adds Ollama on CPU. Works on Mac, Linux, Windows.
#   gpu               ->  adds Ollama on CPU (GPU device added by gpu override).
#
# Usage:
#   Cloud AI only:           docker compose up --build
#   Local Ollama, CPU/Mac:   docker compose --profile ollama up --build
#   Local Ollama, NVIDIA:    docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile gpu up --build
# -----------------------------------------------------------------------------

name: jenkins-analyzer

services:

  # -- Python FastAPI backend --------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jenkins-analyzer-api:latest
    container_name: jenkins-analyzer-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - config_data:/app/config_rw
    environment:
      # -- AI provider --
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # -- Ollama --
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-codellama:13b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
      # -- Private AI endpoint --
      - PRIVATE_AI_BASE_URL=${PRIVATE_AI_BASE_URL:-}
      - PRIVATE_AI_API_KEY=${PRIVATE_AI_API_KEY:-}
      - PRIVATE_AI_MODEL=${PRIVATE_AI_MODEL:-}
      # -- GitHub --
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_TYPE=${GITHUB_TYPE:-public}
      - GITHUB_ENTERPRISE_URL=${GITHUB_ENTERPRISE_URL:-}
      # -- Network / isolation --
      - PRIVATE_ONLY_MODE=${PRIVATE_ONLY_MODE:-false}
      - ISOLATED_MODE=${ISOLATED_MODE:-false}
      - VERIFY_SSL=${VERIFY_SSL:-true}
      - GITHUB_VERIFY_SSL=${GITHUB_VERIFY_SSL:-true}
      - GITHUB_API_URL=${GITHUB_API_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # allows connecting to native Ollama on Mac/Linux host
    networks:
      - analyzer-net
    healthcheck:
      test: ["CMD", "curl", "-f", "--noproxy", "localhost", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -- React frontend (nginx) --------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    image: jenkins-analyzer-frontend:latest
    container_name: jenkins-analyzer-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/app.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - analyzer-net
    healthcheck:
      test: ["CMD", "sh", "-c", "no_proxy=localhost wget -qO- http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # -- Ollama local model ------------------------------------------------------
  # Included in both the "ollama" (CPU) and "gpu" profiles.
  # No deploy block here -- docker-compose.gpu.yml adds the NVIDIA device
  # reservation when running in GPU mode.
  ollama:
    profiles: ["ollama", "gpu"]
    image: ollama/ollama:latest
    container_name: jenkins-analyzer-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0          # bind to all interfaces so other containers can connect
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    networks:
      - analyzer-net
    healthcheck:
      test: ["CMD", "sh", "-c", "OLLAMA_HOST=localhost:11434 ollama list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  analyzer-net:
    driver: bridge

volumes:
  ollama_models:
    driver: local
  config_data:
    driver: local
